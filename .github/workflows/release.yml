name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: |
          set -euo pipefail
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "Files need gofmt:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  release:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      version: ${{ steps.semrel.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version and create tag
        id: semrel
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          changelog-generator-opt: "emojis=true"

      - name: Setup Go
        if: steps.semrel.outputs.version != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build cross-platform binaries
        if: steps.semrel.outputs.version != ''
        env:
          VERSION: v${{ steps.semrel.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            GOOS="${t%/*}"
            GOARCH="${t#*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            name="easyrice-${VERSION}-${GOOS}-${GOARCH}${EXT}"
            echo "Building $name"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" -o "dist/${name}" ./cli
          done

      - name: Generate checksums
        if: steps.semrel.outputs.version != ''
        working-directory: dist
        run: sha256sum easyrice-* > checksums.txt

      - name: Upload assets to release
        if: steps.semrel.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ steps.semrel.outputs.version }}
        run: gh release upload "${VERSION}" dist/* --clobber
