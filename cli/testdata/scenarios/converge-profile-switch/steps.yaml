steps:
  - name: "install demo common profile"
    args: ["install", "demo", "--profile", "common", "--yes", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "Installed demo"
      home: "expected/step-0/home.txt"
      state: "expected/step-0/state.txt"
  - name: "switch demo to work profile"
    args: ["install", "demo", "--profile", "work", "--yes", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "Switched demo from profile common to work"
      home: "expected/step-1/home.txt"
      state: "expected/step-1/state.txt"
