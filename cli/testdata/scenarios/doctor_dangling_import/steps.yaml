steps:
  - name: "doctor flags dangling import to missing remote"
    args: ["doctor", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 1
      stdout_contains:
        - "[ERROR]"
        - "demo.default"
        - "remotes/missing"
        - "is not initialized"
        - "issue(s)"
