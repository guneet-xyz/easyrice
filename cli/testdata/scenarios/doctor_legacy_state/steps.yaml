steps:
  - name: "doctor warns about legacy rice state file"
    args: ["doctor", "--state", "__STATE__"]
    mutate:
      - op: write_file
        path: "<HOME>/.config/rice/state.json"
        content: "{}\n"
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "[WARN]"
        - "Legacy rice state found"
        - ".config/rice/state.json"
        - "All checks passed."
