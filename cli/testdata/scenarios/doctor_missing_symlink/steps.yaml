steps:
  - name: "install demo"
    args: ["install", "demo", "--profile", "default", "--yes", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "demo"

  - name: "doctor flags missing symlink after manual deletion"
    args: ["doctor", "--state", "__STATE__"]
    mutate:
      - op: remove
        path: "<HOME>/.config/demo/file1"
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 1
      stdout_contains:
        - "[ERROR]"
        - "demo"
        - "missing symlink"
        - "file1"
        - "issue(s)"
