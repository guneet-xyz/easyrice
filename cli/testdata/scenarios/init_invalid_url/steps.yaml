steps:
  - name: "init fails with invalid URL"
    mutate:
      - op: remove
        path: "<REPO>"
    args: ["init", "/tmp/easyrice-nonexistent-path-12345.git", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 1
      stdout_contains:
        - "clone:"
