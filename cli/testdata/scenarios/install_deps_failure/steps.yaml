mocks:
  - deps_fail_mock
steps:
  - name: "install demo fails when dependency probe reports missing"
    args: ["install", "demo", "--profile", "default", "--yes", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 1
      stdout_contains:
        - "ensure dependencies"
        - "failtool"
        - "no install methods available"
