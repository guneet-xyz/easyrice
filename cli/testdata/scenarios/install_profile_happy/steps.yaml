steps:
  - name: "install ghostty common profile"
    args: ["install", "ghostty", "--profile", "common", "--yes", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "ghostty"
      home: "expected/step-0/home.txt"
      state: "expected/step-0/state.txt"
