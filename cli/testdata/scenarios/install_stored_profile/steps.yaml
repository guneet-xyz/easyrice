steps:
  - name: "install demo resolves stored profile macbook from state"
    args: ["install", "demo", "--yes", "--state", "__STATE__"]
    mutate:
      - op: write_file
        path: "<HOME>/.config/easyrice/state.json"
        content: |
          {"demo": {"profile": "macbook", "installed_links": [], "installed_at": "2024-01-01T00:00:00Z"}}
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "demo is already up to date"
      home: "expected/step-0/home.txt"
      state: "expected/step-0/state.txt"
