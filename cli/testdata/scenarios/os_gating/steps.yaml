steps:
  - name: "install windows-only package on linux fails with os check error"
    args: ["install", "demo", "--profile", "default", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 1
      stdout_contains:
        - "does not support"
        - "windows"
