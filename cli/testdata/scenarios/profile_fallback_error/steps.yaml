steps:
  - name: "install on unsupported OS errors clearly"
    args: ["install", "linux_only_pkg", "--profile", "linux-only", "--skip-deps", "--yes", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 1
      stdout_contains:
        - "linux_only_pkg"
        - "does not support"
      state: "expected/step-0/state.txt"
