steps:
  - name: "install demo with missing remote submodule errors"
    args:
      - "--state"
      - "__STATE__"
      - "--yes"
      - "install"
      - "demo"
      - "--profile"
      - "default"
      - "--skip-deps"
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 1
      stdout_contains: ["remote is not initialized; run `rice remote update"]
      state: "expected/step-0/state.txt"
