steps:
  - name: "install demo"
    args: ["install", "demo", "--profile", "default", "--yes", "--state", "__STATE__"]
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "Installed demo"
      home: "expected/step-0/home.txt"
      state: "expected/step-0/state.txt"
  - name: "status shows UNTRACKED after package removed from rice.toml"
    args: ["status", "demo", "--state", "__STATE__"]
    mutate:
      - op: write_file
        path: "<REPO>/rice.toml"
        content: "schema_version = 1\n"
    env:
      HOME: "__HOME__"
      EASYRICE_REPO: "__REPO__"
      EASYRICE_STATE: "__STATE__"
    expect:
      exit_code: 0
      stdout_contains:
        - "UNTRACKED"
